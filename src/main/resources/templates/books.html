<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <style>
        :root {
            color-scheme: light dark;
            --bg: #f4f1ea;
            --card: #fffdf8;
            --text: #1f2933;
            --muted: #6b7280;
            --border: #e5e7eb;
            --available: #166534;
            --unavailable: #b91c1c;
            --accent: #1d4ed8;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Georgia, "Times New Roman", serif;
            background: linear-gradient(180deg, #efe7d7 0%, var(--bg) 220px);
            color: var(--text);
            line-height: 1.5;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 2rem 1rem 3rem;
        }

        header {
            margin-bottom: 2rem;
        }

        h1 {
            margin: 0 0 0.5rem;
            font-size: 2.25rem;
        }

        .subtitle {
            margin: 0;
            color: var(--muted);
        }

        .empty {
            padding: 2rem;
            border: 1px dashed var(--border);
            border-radius: 12px;
            background: var(--card);
            text-align: center;
            color: var(--muted);
        }

        .book-list {
            display: grid;
            gap: 1rem;
        }

        .book-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
        }

        .book-title {
            margin: 0 0 0.25rem;
            font-size: 1.35rem;
        }

        .book-meta {
            margin: 0 0 1rem;
            color: var(--muted);
        }

        .show-copies-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.45rem 0.9rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #f8fafc;
            color: var(--accent);
            font-family: inherit;
            font-size: 0.95rem;
            cursor: pointer;
        }

        .show-copies-btn:disabled {
            opacity: 0.6;
            cursor: wait;
        }

        .copies-panel {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        .copies-title {
            margin: 0 0 0.75rem;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--muted);
        }

        .copies {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .copy-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.35rem 0.65rem;
            border-radius: 999px;
            font-size: 0.9rem;
            border: 1px solid var(--border);
            background: #f8fafc;
        }

        .copy-badge.available {
            color: var(--available);
            border-color: #bbf7d0;
            background: #f0fdf4;
        }

        .copy-badge.unavailable {
            color: var(--unavailable);
            border-color: #fecaca;
            background: #fef2f2;
        }

        .no-copies,
        .copies-error {
            margin: 0;
            color: var(--muted);
            font-style: italic;
        }

        .copies-error {
            color: var(--unavailable);
            font-style: normal;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>Library</h1>
        <p class="subtitle">All books and their copies</p>
    </header>

    <p th:if="${#lists.isEmpty(books)}" class="empty">No books yet.</p>

    <div th:unless="${#lists.isEmpty(books)}" class="book-list">
        <article th:each="book : ${books}" class="book-card" th:attr="data-book-id=${book.id}">
            <h2 class="book-title" th:text="${book.title}">Book title</h2>
            <p class="book-meta">
                <span th:text="${book.author}">Author</span>
                · ISBN <span th:text="${book.isbn}">ISBN</span>
                · <span th:text="${book.publishedYear}">Year</span>
            </p>

            <button type="button" class="show-copies-btn">Show copies</button>
            <div class="copies-panel hidden"></div>
        </article>
    </div>
</div>

<script>
    function escapeHtml(value) {
        return String(value)
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function renderCopies(copies) {
        if (!copies || copies.length === 0) {
            return '<p class="no-copies">No copies available.</p>';
        }

        const items = copies.map(copy => {
            const statusClass = copy.available ? 'available' : 'unavailable';
            const statusText = copy.available ? 'Available' : 'Checked out';
            return `<li class="copy-badge ${statusClass}">
                <span>#${copy.id}</span>
                <span>${statusText}</span>
            </li>`;
        }).join('');

        return `<h3 class="copies-title">Copies</h3><ul class="copies">${items}</ul>`;
    }

    document.querySelectorAll('.book-card').forEach(card => {
        const button = card.querySelector('.show-copies-btn');
        const panel = card.querySelector('.copies-panel');
        const bookId = card.dataset.bookId;

        button.addEventListener('click', async () => {
            if (panel.dataset.loaded === 'true') {
                const hidden = panel.classList.toggle('hidden');
                const count = panel.dataset.copyCount ?? '0';
                button.textContent = hidden ? 'Show copies' : `Hide copies (${count})`;
                return;
            }

            button.disabled = true;
            button.textContent = 'Loading...';

            try {
                const response = await fetch(`books/${bookId}`);
                if (!response.ok) {
                    throw new Error(`Failed to load copies (${response.status})`);
                }

                const book = await response.json();
                const copies = book.copies ?? [];
                panel.innerHTML = renderCopies(copies);
                panel.dataset.loaded = 'true';
                panel.dataset.copyCount = String(copies.length);
                panel.classList.remove('hidden');
                button.textContent = `Hide copies (${copies.length})`;
            } catch (error) {
                panel.innerHTML = `<p class="copies-error">${escapeHtml(error.message ?? 'Failed to load copies')}</p>`;
                panel.classList.remove('hidden');
                button.textContent = 'Show copies';
            } finally {
                button.disabled = false;
            }
        });
    });
</script>
</body>
</html>
